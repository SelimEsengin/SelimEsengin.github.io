<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selif</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Satisfy&family=Raleway:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #f7f5f0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg svg {
      width: 100%;
      height: 100%;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 60px 40px;
      text-align: center;
    }

    .logo {
      font-family: 'Satisfy', cursive;
      font-size: 88px;
      color: #1a1a1a;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1s ease forwards 0.3s;
    }

    .divider {
      width: 0;
      height: 1px;
      background: #c0bdb8;
      animation: expandLine 0.8s ease forwards 1s;
    }

    .motto {
      font-family: 'Raleway', sans-serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: #999;
      min-height: 1.4em;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards 1.6s;
    }

    .cursor {
      display: inline-block;
      width: 1px;
      height: 1em;
      background: #999;
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 0.7s step-end infinite;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes expandLine {
      to { width: 48px; }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="bg">
    <svg xmlns="http://www.w3.org/2000/svg">
      <line x1="0" y1="25%" x2="100%" y2="25%" stroke="#2c2c2c" stroke-width="0.5" opacity="0.05"/>
      <line x1="0" y1="50%" x2="100%" y2="50%" stroke="#2c2c2c" stroke-width="0.5" opacity="0.05"/>
      <line x1="0" y1="75%" x2="100%" y2="75%" stroke="#2c2c2c" stroke-width="0.5" opacity="0.05"/>
      <line x1="25%" y1="0" x2="25%" y2="100%" stroke="#2c2c2c" stroke-width="0.5" opacity="0.05"/>
      <line x1="50%" y1="0" x2="50%" y2="100%" stroke="#2c2c2c" stroke-width="0.5" opacity="0.05"/>
      <line x1="75%" y1="0" x2="75%" y2="100%" stroke="#2c2c2c" stroke-width="0.5" opacity="0.05"/>
      <circle cx="15%" cy="15%" r="300" fill="#2c2c2c" opacity="0.03"/>
      <circle cx="85%" cy="85%" r="250" fill="#2c2c2c" opacity="0.03"/>
    </svg>
  </div>

  <div class="container">
    <div class="logo">Selif</div>
    <div class="divider"></div>
    <div class="motto"><span id="typed"></span><span class="cursor" id="cursor"></span></div>
  </div>

  <script>
    const text = 'Where two become one.';
    const el = document.getElementById('typed');
    const cursor = document.getElementById('cursor');
    let i = 0;

    function type() {
      if (i < text.length) {
        el.textContent += text[i];
        i++;
        setTimeout(type, 68);
      } else {
        setTimeout(() => cursor.style.display = 'none', 1200);
      }
    }

    setTimeout(type, 1800);
  </script>

</body>
</html>
